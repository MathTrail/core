apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mathtrail

# Default: deploy everything
requires:
  - configs:
      - all-infra
      - all-services

---
# ── Aggregate modules ─────────────────────────────────────────

apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: all-infra

requires:
  - configs:
      - infra
  - configs:
      - infra-chaos

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: all-services

requires:
  - configs:
      - identity
      - mentor
      - profile
      - canvas

---
# ── Infrastructure ────────────────────────────────────────────

apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: infra

requires:
  - path: ../mathtrail-infra

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: infra-chaos

requires:
  - path: ../mathtrail-infra-chaos

---
# ── Services ──────────────────────────────────────────────────

apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: identity

requires:
  - path: ../mathtrail-identity

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mentor

requires:
  - path: ../mathtrail-mentor

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: profile

requires:
  - path: ../mathtrail-profile

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: canvas

requires:
  - path: ../canvas-api
